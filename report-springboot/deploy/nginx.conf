# ═══════════════════════════════════════════════════════════
#  report.jgjl.cn Nginx 配置
#  将此文件内容粘贴到宝塔站点 → 设置 → 配置文件 中
#  ⚠️ 将 report.jgjl.cn 替换为你的实际域名
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    listen 443 ssl http2;
    server_name report.jgjl.cn;
    index index.html;
    root /www/wwwroot/report.jgjl.cn;

    # ──── SSL（宝塔自动管理，勿改路径） ────
    ssl_certificate    /www/server/panel/vhost/cert/report.jgjl.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/report.jgjl.cn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";

    # HTTP → HTTPS
    if ($server_port != 443) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    # ──── 禁止敏感文件访问 ────
    location ~* (\.env|\.git|\.user\.ini|\.htaccess|docker-compose\.yml|Dockerfile|\.jar|application.*\.yml)$ {
        return 404;
    }

    # ──── 后端 API 代理（端口 8082，与 RealTimeVideo 的 8081 不冲突） ────
    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    location /actuator/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /h2-console/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ──── 静态资源缓存 ────
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d; add_header Cache-Control "public, immutable";
    }

    # ──── SPA 路由 ────
    location / { try_files $uri $uri/ /index.html; }

    access_log  /www/wwwlogs/report.jgjl.cn.log;
    error_log   /www/wwwlogs/report.jgjl.cn.error.log;
}
