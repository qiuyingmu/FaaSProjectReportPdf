<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <title>管理员登录</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-sub {
            font-size: 13px;
            color: #8c8c8c;
            text-align: center;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #595959;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .login-btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-btn:hover { opacity: 0.9; }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        .logout-msg {
            background: #f0fdf4;
            color: #059669;
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }
        .logout-msg.show { display: block; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-title">运营报告管理</div>
    <div class="login-sub">请登录以访问后台管理</div>

    <div class="error-msg" id="errorMsg" th:if="${param.error}" th:classappend="'show'">
        账号或密码错误
    </div>
    <div class="logout-msg" id="logoutMsg" th:if="${param.logout}" th:classappend="'show'">
        已安全退出
    </div>

    <form th:action="@{/admin/login}" method="post">
        <div class="form-group">
            <label for="username">账号</label>
            <input type="text" id="username" name="username" placeholder="请输入管理员账号" autofocus/>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码"/>
        </div>
        <button type="submit" class="login-btn">登 录</button>
    </form>
</div>
</body>
</html>
