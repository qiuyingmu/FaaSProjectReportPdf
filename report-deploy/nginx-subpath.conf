# ═══════════════════════════════════════════════════════════
#  FaaSProjectReportPdf — Nginx 子路径配置（CORS + root 修复版）
#
#  将此代码块插入到 realtimevideo.jgjl.cn 的 server {} 块中
#  （宝塔 → 站点设置 → 配置文件）
#
#  放在「SPA 路由 location / { try_files ... }」之前
# ═══════════════════════════════════════════════════════════

# ──── 报告系统前端（子路径 /report） ────
# 使用 root 而非 alias，避免 alias + try_files 的 SPA 路由 bug
# 使用 ^~ 避免被全局的 js/css regex 缓存规则抢走匹配
location ^~ /report/ {
    root /www/wwwroot/realtimevideo.jgjl.cn;
    try_files $uri $uri/ /report/index.html;
    add_header Access-Control-Allow-Origin '*' always;
}

# ──── 报告系统后端 API（剥离 /report 前缀后转发） ────
location /report/api/ {
    rewrite ^/report(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8082;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

location /report/actuator/ {
    rewrite ^/report(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8082;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /report/admin/ {
    rewrite ^/report(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:8082;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ──── 报告系统静态资源缓存 ────
# ^~ 确保 CORS 头能正确加在 js/css 文件上，不被全局 regex 覆盖
location ^~ /report/assets/ {
    root /www/wwwroot/realtimevideo.jgjl.cn;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin '*' always;
}
